# =============================================
# ANGKOR Input File
# IAEA 2D PWR Benchmark (2 groups)
# Reference keff ≈ 1.02986 (quarter core)
# =============================================

title: "IAEA 2D PWR Benchmark"

geometry:
  type: 2D_rectangular
  domain_x: 170.0
  domain_y: 170.0
  nx: 100
  ny: 100

regions:
  # fuel and reflector zones (same pattern as your earlier YAML)
  - {name: r1, x_min: 0,   x_max: 170, y_min: 160, y_max: 170, material: fuel1}
  - {name: r2, x_min: 0,   x_max: 170, y_min: 150, y_max: 160, material: fuel1}
  - {name: r3, x_min: 0,   x_max: 170, y_min: 140, y_max: 150, material: fuel2}
  - {name: r4, x_min: 0,   x_max: 170, y_min: 130, y_max: 140, material: fuel2}
  - {name: r5, x_min: 0,   x_max: 170, y_min: 120, y_max: 130, material: fuel_cr}
  - {name: r6, x_min: 0,   x_max: 170, y_min: 110, y_max: 120, material: fuel2}
  - {name: r7, x_min: 0,   x_max: 170, y_min: 100, y_max: 110, material: fuel2}
  - {name: r8, x_min: 0,   x_max: 170, y_min:  90, y_max: 100, material: fuel1}
  - {name: r9, x_min: 0,   x_max: 170, y_min:   0, y_max:  90, material: reflector}

materials:
  fuel1:
    groups: 2
    D:          [1.5, 0.4]
    sigma_a:    [0.010, 0.080]
    nu_sigma_f: [0.000, 0.135]
    sigma_s:
      - [0.0, 0.020]
      - [0.0, 0.0]

  fuel2:
    groups: 2
    D:          [1.5, 0.4]
    sigma_a:    [0.010, 0.085]
    nu_sigma_f: [0.000, 0.135]
    sigma_s:
      - [0.0, 0.020]
      - [0.0, 0.0]

  fuel_cr:
    groups: 2
    D:          [1.5, 0.4]
    sigma_a:    [0.010, 0.130]
    nu_sigma_f: [0.000, 0.135]
    sigma_s:
      - [0.0, 0.020]
      - [0.0, 0.0]

  reflector:
    groups: 2
    D:          [2.0, 0.3]
    sigma_a:    [0.000, 0.010]
    nu_sigma_f: [0.000, 0.000]
    sigma_s:
      - [0.0, 0.040]
      - [0.0, 0.0]

solver:
  max_iteration: 1000
  convergence: 1.0e-6

boundary_conditions:
  left:   reflective
  right:  reflective
  top:    reflective
  bottom: reflective