title: "IAEA 2D PWR Benchmark ~~ Half Core (x-symmetry)"

geometry:
  type: 2D_rectangular
  domain_x: 170.0      # full width (left reflective plane at x=0)
  domain_y: 170.0
  nx: 300
  ny: 300

regions:
  # Same layout as the quarter, covering 0..170 in both x and y
  - {name: r1c1, x_min: 0,  x_max: 10, y_min: 160, y_max: 170, material: fuel1}
  - {name: r1c2, x_min: 10, x_max: 20, y_min: 160, y_max: 170, material: fuel1}
  - {name: r1c3, x_min: 20, x_max: 30, y_min: 160, y_max: 170, material: fuel1}
  - {name: r1c4, x_min: 30, x_max: 40, y_min: 160, y_max: 170, material: fuel1}
  - {name: r1c5, x_min: 40, x_max: 50, y_min: 160, y_max: 170, material: fuel1}
  - {name: r1c6, x_min: 50, x_max: 60, y_min: 160, y_max: 170, material: fuel1}
  - {name: r1c7, x_min: 60, x_max: 70, y_min: 160, y_max: 170, material: fuel1}
  - {name: r1c8, x_min: 70, x_max: 80, y_min: 160, y_max: 170, material: fuel1}
  - {name: r1c9, x_min: 80, x_max: 170, y_min: 160, y_max: 170, material: reflector}

  - {name: r2c1, x_min: 0,  x_max: 10, y_min: 150, y_max: 160, material: fuel1}
  - {name: r2c2, x_min: 10, x_max: 20, y_min: 150, y_max: 160, material: fuel1}
  - {name: r2c3, x_min: 20, x_max: 30, y_min: 150, y_max: 160, material: fuel1}
  - {name: r2c4, x_min: 30, x_max: 40, y_min: 150, y_max: 160, material: fuel1}
  - {name: r2c5, x_min: 40, x_max: 50, y_min: 150, y_max: 160, material: fuel1}
  - {name: r2c6, x_min: 50, x_max: 60, y_min: 150, y_max: 160, material: fuel1}
  - {name: r2c7, x_min: 60, x_max: 70, y_min: 150, y_max: 160, material: fuel1}
  - {name: r2c8, x_min: 70, x_max: 80, y_min: 150, y_max: 160, material: fuel2}
  - {name: r2c9, x_min: 80, x_max: 170, y_min: 150, y_max: 160, material: reflector}

  - {name: r3c1, x_min: 0,  x_max: 10, y_min: 140, y_max: 150, material: fuel1}
  - {name: r3c2, x_min: 10, x_max: 20, y_min: 140, y_max: 150, material: fuel1}
  - {name: r3c3, x_min: 20, x_max: 30, y_min: 140, y_max: 150, material: fuel1}
  - {name: r3c4, x_min: 30, x_max: 40, y_min: 140, y_max: 150, material: fuel1}
  - {name: r3c5, x_min: 40, x_max: 50, y_min: 140, y_max: 150, material: fuel1}
  - {name: r3c6, x_min: 50, x_max: 60, y_min: 140, y_max: 150, material: fuel2}
  - {name: r3c7, x_min: 60, x_max: 70, y_min: 140, y_max: 150, material: fuel2}
  - {name: r3c8, x_min: 70, x_max: 80, y_min: 140, y_max: 150, material: reflector}
  - {name: r3c9, x_min: 80, x_max: 170, y_min: 140, y_max: 150, material: reflector}

  - {name: r4c1, x_min: 0,  x_max: 10, y_min: 130, y_max: 140, material: fuel1}
  - {name: r4c2, x_min: 10, x_max: 20, y_min: 130, y_max: 140, material: fuel1}
  - {name: r4c3, x_min: 20, x_max: 30, y_min: 130, y_max: 140, material: fuel1}
  - {name: r4c4, x_min: 30, x_max: 40, y_min: 130, y_max: 140, material: fuel1}
  - {name: r4c5, x_min: 40, x_max: 50, y_min: 130, y_max: 140, material: fuel2}
  - {name: r4c6, x_min: 50, x_max: 60, y_min: 130, y_max: 140, material: fuel2}
  - {name: r4c7, x_min: 60, x_max: 80, y_min: 130, y_max: 140, material: reflector}
  - {name: r4c8, x_min: 80, x_max: 170, y_min: 130, y_max: 140, material: reflector}

  - {name: r5c1, x_min: 0,  x_max: 10, y_min: 120, y_max: 130, material: fuel1}
  - {name: r5c2, x_min: 10, x_max: 20, y_min: 120, y_max: 130, material: fuel1}
