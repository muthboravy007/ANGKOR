  - {name: r5c7, x_min: 60, x_max: 170, y_min: 120, y_max: 130, material: reflector}

  - {name: r6c1, x_min: 0,  x_max: 10, y_min: 110, y_max: 120, material: fuel1}
  - {name: r6c2, x_min: 10, x_max: 20, y_min: 110, y_max: 120, material: fuel1}
  - {name: r6c3, x_min: 20, x_max: 30, y_min: 110, y_max: 120, material: fuel2}
  - {name: r6c4, x_min: 30, x_max: 40, y_min: 110, y_max: 120, material: fuel2}
  - {name: r6c5, x_min: 40, x_max: 50, y_min: 110, y_max: 120, material: fuel_cr}
  - {name: r6c6, x_min: 50, x_max: 170, y_min: 110, y_max: 120, material: reflector}

  - {name: r7c1, x_min: 0,  x_max: 10, y_min: 100, y_max: 110, material: fuel1}
  - {name: r7c2, x_min: 10, x_max: 20, y_min: 100, y_max: 110, material: fuel1}
  - {name: r7c3, x_min: 20, x_max: 30, y_min: 100, y_max: 110, material: fuel2}
  - {name: r7c4, x_min: 30, x_max: 170, y_min: 100, y_max: 110, material: reflector}

  - {name: r8c1, x_min: 0,  x_max: 10, y_min: 90, y_max: 100, material: fuel1}
  - {name: r8c2, x_min: 10, x_max: 20, y_min: 90, y_max: 100, material: fuel2}
  - {name: r8c3, x_min: 20, x_max: 170, y_min: 90, y_max: 100, material: reflector}

  - {name: r9, x_min: 0, x_max: 170, y_min: 0, y_max: 90, material: reflector}

materials:
  fuel1:
    groups: 2
    D:          [1.5, 0.4]
    sigma_a:    [0.0100, 0.0850]
    nu_sigma_f: [0.0000, 0.135]
    chi:        [1.0, 0.0]
    sigma_s:
      - [0.0, 0.0200]
      - [0.0, 0.0]

  fuel2:
    groups: 2
    D:          [1.5, 0.4]
    sigma_a:    [0.0100, 0.1300]
    nu_sigma_f: [0.0000, 0.135]
    chi:        [1.0, 0.0]
    sigma_s:
      - [0.0, 0.0200]
      - [0.0, 0.0]

  fuel_cr:
    groups: 2
    D:          [1.5, 0.4]
    sigma_a:    [0.0100, 0.1800]
    nu_sigma_f: [0.0000, 0.135]
    chi:        [1.0, 0.0]
    sigma_s:
      - [0.0, 0.0200]
      - [0.0, 0.0]

  reflector:
    groups: 2
    D:          [2.0, 0.3]
    sigma_a:    [0.0000, 0.0100]
    nu_sigma_f: [0.0, 0.0]
    chi:        [0.0, 0.0]
    sigma_s:
      - [0.0, 0.0400]
      - [0.0, 0.0]

solver:
  max_iterations: 1000
  convergence: 1.0e-6
  buckling: 8.0e-5

boundary_conditions:
  left: reflective    # symmetry at x=0
  right: vacuum
  top: vacuum
  bottom: vacuum
